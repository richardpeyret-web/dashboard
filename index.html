<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Windows 11</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#0f6cbd,#60a5fa);
    min-height:100vh;
    padding:20px;
    color:#fff;
}

.header{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
}

.header h1{
    margin-bottom:10px;
}

.search{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:20px;
    min-height:220px;
}

.card h2{
    margin-bottom:15px;
}

.clock-placeholder{
    text-align:center;
    font-size:18px;
    margin-top:50px;
}

.weather{
    font-size:18px;
}

.news-item{
    margin-bottom:10px;
}

.fx{
    font-size:20px;
    line-height:2;
}

</style>
</head>

<body>

<div class="header">
<h1>Tableau de bord personnel</h1>

<input
class="search"
placeholder="Recherche Google..."
onkeydown="
if(event.key==='Enter'){
window.open(
'https://www.google.com/search?q='+
encodeURIComponent(this.value)
);
}">
</div>

<div class="grid">

<div class="card">
<h2>Paris</h2>
<div id="clock-paris" class="clock-placeholder">
Horloge Paris
</div>
</div>

<div class="card">
<h2>Londres</h2>
<div id="clock-london" class="clock-placeholder">
Horloge Londres
</div>
</div>

<div class="card">
<h2>New York</h2>
<div id="clock-ny" class="clock-placeholder">
Horloge New York
</div>
</div>

<div class="card">
<h2>Météo locale</h2>
<div id="weather" class="weather">
Chargement...
</div>
</div>

<div class="card">
<h2>Actualités</h2>
<div id="news">
Chargement...
</div>
</div>

<div class="card">
<h2>Devises</h2>

<div id="fx" class="fx">
Chargement...
</div>

</div>

</div>

    <script>

// ===== CONFIG =====

const OPENWEATHER_API_KEY =
"33dd8e07bda2e3a42995474eb8af659d";

const GNEWS_API_KEY =
"ef5cea8c4b7b872f2ef3f4386ab69a40";

// ===== HORLOGES =====

function updateClocks() {

 document.getElementById("clock-paris")
 .innerHTML =
 new Date().toLocaleTimeString(
 'fr-FR',
 {timeZone:'Europe/Paris'}
 );

 document.getElementById("clock-london")
 .innerHTML =
 new Date().toLocaleTimeString(
 'fr-FR',
 {timeZone:'Europe/London'}
 );

 document.getElementById("clock-ny")
 .innerHTML =
 new Date().toLocaleTimeString(
 'fr-FR',
 {timeZone:'America/New_York'}
 );
}

setInterval(updateClocks,1000);
updateClocks();

// ===== METEO =====

navigator.geolocation.getCurrentPosition(

async position => {

try {

const lat = position.coords.latitude;
const lon = position.coords.longitude;

const url =
`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=fr&appid=${OPENWEATHER_API_KEY}`;

const weather =
await fetch(url).then(r=>r.json());

document.getElementById("weather").innerHTML =

`<strong>${weather.name}</strong><br>
${Math.round(weather.main.temp)} °C<br>
${weather.weather[0].description}`;

}

catch(error){

document.getElementById("weather")
.innerHTML =
"Impossible de charger la météo";

}

}

);

// ===== DEVISES =====

fetch(
"https://api.frankfurter.app/latest?from=EUR&to=USD,CHF,GBP"
)

.then(r=>r.json())

.then(data=>{

document.getElementById("fx").innerHTML =

`EUR/USD : ${data.rates.USD}<br>
EUR/CHF : ${data.rates.CHF}<br>
EUR/GBP : ${data.rates.GBP}`;

})

.catch(()=>{

document.getElementById("fx")
.innerHTML =
"Impossible de charger les devises";

});

// ===== ACTUALITES =====

fetch(
`https://gnews.io/api/v4/top-headlines?lang=fr&country=fr&max=5&apikey=${GNEWS_API_KEY}`
)

.then(r=>r.json())

.then(data=>{

document.getElementById("news").innerHTML =

data.articles.map(article =>

`<div style="margin-bottom:12px">
<a href="${article.url}"
target="_blank"
style="color:white;text-decoration:none;">
${article.title}
</a>
</div>`

).join("");

})

.catch(()=>{

document.getElementById("news")
.innerHTML =
"Impossible de charger les actualités";

});

</script>
</body>
</html>

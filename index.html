<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Windows 11</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#0f6cbd,#60a5fa);
    min-height:100vh;
    padding:20px;
    color:#fff;
}

.header{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
}

.header h1{
    margin-bottom:10px;
}

.search{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:20px;
    min-height:220px;
}

.card h2{
    margin-bottom:15px;
}

.clock-placeholder{
    text-align:center;
    font-size:18px;
    margin-top:50px;
}

.weather{
    font-size:18px;
}

.news-item{
    margin-bottom:10px;
}

.fx{
    font-size:20px;
    line-height:2;
}

</style>
</head>

<body>

<div class="header">
<h1>Tableau de bord personnel</h1>

<input
class="search"
placeholder="Recherche Google..."
onkeydown="
if(event.key==='Enter'){
window.open(
'https://www.google.com/search?q='+
encodeURIComponent(this.value)
);
}">
</div>

<div class="grid">

<div class="card">
<h2>Paris</h2>
<div id="clock-paris" class="clock-placeholder">
<canvas id="parisClock" width="180" height="180"></canvas>
</div>
</div>

<div class="card">
<h2>Londres</h2>
<div id="clock-london" class="clock-placeholder">
<canvas id="londonClock" width="180" height="180"></canvas>
</div>
</div>

<div class="card">
<h2>New York</h2>
<div id="clock-ny" class="clock-placeholder">
<canvas id="nyClock" width="180" height="180"></canvas>
</div>
</div>

<div class="card">
<h2>Météo locale</h2>
<div id="weather" class="weather">
Chargement...
</div>
</div>

<div class="card">
<h2>Actualités</h2>
<div id="news">
Chargement...
</div>
</div>

<div class="card">
<h2>Devises</h2>

<div id="fx" class="fx">
Chargement...
</div>

</div>

</div>
<script>

function drawClock(canvasId, timeZone) {

    const canvas = document.getElementById(canvasId);

    if (!canvas) return;

    const ctx = canvas.getContext("2d");

    const radius = canvas.height / 2;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();

    ctx.translate(radius, radius);

    drawFace(ctx, radius);
    drawNumbers(ctx, radius);

    const now = new Date();

    const local = new Date(
        now.toLocaleString("en-US",{timeZone})
    );

    const hour = local.getHours();
    const minute = local.getMinutes();
    const second = local.getSeconds();

    drawTime(ctx,radius,hour,minute,second);

    ctx.restore();
}

function drawFace(ctx, radius){

    ctx.beginPath();
    ctx.arc(0,0,radius*0.95,0,2*Math.PI);
    ctx.fillStyle="#ffffff";
    ctx.fill();

    ctx.strokeStyle="#d0d7e2";
    ctx.lineWidth=4;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0,0,5,0,2*Math.PI);
    ctx.fillStyle="#333";
    ctx.fill();
}

function drawNumbers(ctx,radius){

    ctx.font=radius*0.18+"px Segoe UI";
    ctx.textBaseline="middle";
    ctx.textAlign="center";

    for(let num=1; num<=12; num++){

        let ang=num*Math.PI/6;

        ctx.rotate(ang);
        ctx.translate(0,-radius*0.75);
        ctx.rotate(-ang);

        ctx.fillStyle="#333";
        ctx.fillText(num.toString(),0,0);

        ctx.rotate(ang);
        ctx.translate(0,radius*0.75);
        ctx.rotate(-ang);
    }
}

function drawHand(ctx,pos,length,width,color){

    ctx.beginPath();
    ctx.lineWidth=width;
    ctx.lineCap="round";
    ctx.strokeStyle=color;

    ctx.moveTo(0,0);
    ctx.rotate(pos);
    ctx.lineTo(0,-length);
    ctx.stroke();

    ctx.rotate(-pos);
}

function drawTime(ctx,radius,hour,minute,second){

    hour = hour % 12;

    hour =
    hour*Math.PI/6 +
    minute*Math.PI/(6*60) +
    second*Math.PI/(360*60);

    drawHand(ctx,hour,radius*0.45,6,"#111");

    minute =
    minute*Math.PI/30 +
    second*Math.PI/(30*60);

    drawHand(ctx,minute,radius*0.65,4,"#222");

    second =
    second*Math.PI/30;

    drawHand(ctx,second,radius*0.75,2,"#d62828");
}

function updateWorldClocks(){

    drawClock("parisClock","Europe/Paris");
    drawClock("londonClock","Europe/London");
    drawClock("nyClock","America/New_York");
}

setInterval(updateWorldClocks,1000);

updateWorldClocks();

</script>
   </body>
</html>

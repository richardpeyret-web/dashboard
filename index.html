<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Segoe UI,sans-serif;
    background:linear-gradient(135deg,#0f6cbd,#60a5fa);
    color:white;
}

h1{
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:20px;
    text-align:center;
}

canvas{
    background:white;
    border-radius:50%;
}

</style>

</head>

<body>

<h1>Tableau de bord</h1>

<div class="grid">

<div class="card">
<h2>Paris</h2>
<canvas id="parisClock" width="180" height="180"></canvas>
</div>

<div class="card">
<h2>Londres</h2>
<canvas id="londonClock" width="180" height="180"></canvas>
</div>

<div class="card">
<h2>New York</h2>
<canvas id="nyClock" width="180" height="180"></canvas>
</div>
    <div class="card">
<h2>Météo locale</h2>

<div id="weather">

Chargement...

</div>

</div>

</div>

<script>

function drawClock(canvasId,timeZone){

 const canvas=document.getElementById(canvasId);
 const ctx=canvas.getContext("2d");

 const r=90;

 ctx.clearRect(0,0,180,180);

 ctx.save();
 ctx.translate(r,r);

 ctx.beginPath();
 ctx.arc(0,0,80,0,2*Math.PI);
 ctx.fillStyle="white";
 ctx.fill();

 ctx.strokeStyle="#ccc";
 ctx.lineWidth=3;
 ctx.stroke();

 for(let i=1;i<=12;i++){

   let a=i*Math.PI/6;

   ctx.fillStyle="#333";

   ctx.fillText(
      i,
      Math.sin(a)*60-4,
      -Math.cos(a)*60+4
   );

 }

 const d=new Date(
   new Date().toLocaleString(
     "en-US",
     {timeZone}
   )
 );

 let h=d.getHours()%12;
 let m=d.getMinutes();
 let s=d.getSeconds();

 function hand(a,l,w,c){

   ctx.strokeStyle=c;
   ctx.lineWidth=w;

   ctx.beginPath();
   ctx.moveTo(0,0);

   ctx.lineTo(
      Math.sin(a)*l,
      -Math.cos(a)*l
   );

   ctx.stroke();
 }

 hand(
   (h+m/60)*Math.PI/6,
   40,
   5,
   "#111"
 );

 hand(
   m*Math.PI/30,
   55,
   3,
   "#333"
 );

 hand(
   s*Math.PI/30,
   65,
   1,
   "red"
 );

 ctx.restore();
}

function update(){

 drawClock(
   "parisClock",
   "Europe/Paris"
 );

 drawClock(
   "londonClock",
   "Europe/London"
 );

 drawClock(
   "nyClock",
   "America/New_York"
 );

}

setInterval(update,1000);

update();
    async function loadWeather() {

    const weatherDiv =
        document.getElementById("weather");

    if(!navigator.geolocation){

        weatherDiv.innerHTML =
        "Géolocalisation non disponible";

        return;
    }

    navigator.geolocation.getCurrentPosition(

    async position => {

        try {

            const lat =
                position.coords.latitude;

            const lon =
                position.coords.longitude;

            const response =
            await fetch(

            `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=fr&appid=33dd8e07bda2e3a42995474eb8af659d`

            );

            const data =
                await response.json();

            weatherDiv.innerHTML =

            `
            <h1>${Math.round(data.main.temp)}°C</h1>

            <p><strong>${data.name}</strong></p>

            <p>${data.weather[0].description}</p>

            <p>
            Ressenti :
            ${Math.round(data.main.feels_like)}°C
            </p>

            <p>
            Humidité :
            ${data.main.humidity}%
            </p>
            `;

        }

        catch(error){

            weatherDiv.innerHTML =
            "Erreur météo";

        }

    },

    () => {

        weatherDiv.innerHTML =
        "Localisation refusée";

    });

}

loadWeather();
    async function loadRates(){

    const fxDiv =
        document.getElementById("fx");

    try{

        const response =
            await fetch(
            "https://open.er-api.com/v6/latest/EUR"
            );

        const data =
            await response.json();

        fxDiv.innerHTML =

        `
        <div style="font-size:22px;margin:10px 0">
            EUR/USD :
            ${data.rates.USD.toFixed(4)}
        </div>

        <div style="font-size:22px;margin:10px 0">
            EUR/CHF :
            ${data.rates.CHF.toFixed(4)}
        </div>

        <div style="font-size:22px;margin:10px 0">
            EUR/GBP :
            ${data.rates.GBP.toFixed(4)}
        </div>
        `;

    }

    catch(error){

        fxDiv.innerHTML =
            "Erreur devises";

    }

}

loadRates();

</script>
    <div class="card">
<h2>Devises</h2>

<div id="fx">

Chargement...

</div>

</div>

</body>
</html>
